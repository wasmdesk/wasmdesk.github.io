baseURL = "https://wasmdesk.github.io/"
title = "wasmdesk"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "404"]

[markup.goldmark.renderer]
  unsafe = true

[[params.components]]
  name = "Compositor"
  status = "ready"
  blurb = "**wasmbox** — a Wayland-inspired single-instance compositor with an Openbox-style window-manager policy: stacking order, click-to-focus, cascade placement, decorations and a `requestAnimationFrame` render loop, all written in **pure Ruby** and composited to a `<canvas>`."
[[params.components]]
  name = "Dock"
  status = "ready"
  blurb = "**wasmdock** — a macOS-style dock: a bottom-anchored translucent bar with hover magnification (cosine falloff) and click-to-launch. It runs as a standalone external client and posts a `launch` message to the compositor."
[[params.components]]
  name = "External-client protocol"
  status = "active"
  blurb = "Step-B clients each run in their **own Web Worker / WASM instance** and paint into a `SharedArrayBuffer`, speaking a documented `postMessage` wire contract (`hello`/`commit`/`input`/`launch`). The compositor owns the canvas, stacking and input routing."
[[params.components]]
  name = "Pure Ruby on WebAssembly"
  status = "ready"
  blurb = "Everything builds on [go-embedded-ruby](https://github.com/go-embedded-ruby), a pure-Go (CGO=0) Ruby interpreter compiled to `js/wasm`. The window manager is `//go:embed`-ed into one self-contained `.wasm` — no runtime fetch, no C toolchain, full Ruby dynamism."
[[params.components]]
  name = "Toolkit (34 widgets)"
  status = "ready"
  blurb = "**[go-widgets/toolkit](https://github.com/go-widgets/toolkit)** — pure-Go pixel-blitting widget set: Button, Label, Entry, TextView, Menu, MenuBar, Dialog, Tooltip, DropDown, TreeView, Toolbar, Statusbar, FileChooser, ColorChooser, Calendar, Notification, and 20 more. 100% statement coverage. `LoadGTKTheme(css)` parses libadwaita/GTK3 `@define-color` → `Theme`."
[[params.components]]
  name = "Frame strategy (16 combos)"
  status = "ready"
  blurb = "Pluggable window decorations via the compositor's `Frame` class. 2 layouts (Openbox / Aqua) × 7 GTK palettes (Adwaita, Juno, WhiteSur, Solarized) = 16 registered presets. Pick via `?frame=NAME` URL, or from the root menu → Frame. `?frame=aqua-whitesur-light` reproduces macOS Big Sur near-pixel-accurate."
[[params.components]]
  name = "Toolkit-Showcase + Calculator"
  status = "ready"
  blurb = "Two in-tree wasmbox clients that consume the toolkit end-to-end: **Showcase** exercises every widget family across a 7-tab Notebook, with a live GTK-theme picker in the View menu (9 palettes bundled). **Calculator** is a small focused consumer (Entry + 5×4 Button grid). Both at 100% coverage."
[[params.components]]
  name = "wasmaqua (archived)"
  status = "archived"
  blurb = "The macOS-Aqua-themed sibling compositor is **archived**: its chrome is now bundled into wasmbox as the `AquaFrame` preset. `wasmbox-serve -default-frame=aqua` reproduces the old wasmaqua landing page. One binary, both looks (and 14 more themed combos)."
